# Secret : les identifiants de la base de donnees.
# En K8s, un Secret stocke les donnees sensibles separement des manifestes applicatifs.
# (stringData = on ecrit en clair ici, K8s encode en base64 automatiquement)
apiVersion: v1
kind: Secret
metadata:
  name: todo-db-secret
type: Opaque
stringData:
  POSTGRES_DB: todo_db
  POSTGRES_USER: todo_user
  POSTGRES_PASSWORD: todo_pass
# PostgreSQL : un volume persistant + un Deployment + un Service interne.

# 1) Le volume : pour que les donnees survivent au redemarrage du pod
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 2) Le Deployment : 1 pod PostgreSQL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          # On injecte tout le Secret comme variables d'environnement
          envFrom:
            - secretRef:
                name: todo-db-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# 3) Le Service : une adresse stable "postgres-service" pour joindre la base
#    (type ClusterIP par defaut = accessible seulement DANS le cluster)
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

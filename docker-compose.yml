name: todo-api

services:
  api:
    build: .
    container_name: todo-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-todo_db}
      - DB_USER=${DB_USER:-todo_user}
      - DB_PASSWORD=${DB_PASSWORD:-todo_pass}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: todo-db
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_db}
      POSTGRES_USER: ${DB_USER:-todo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-todo_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # accessible seulement depuis la machine locale (pas le reseau externe)
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-todo_user} -d ${DB_NAME:-todo_db}"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  frontend:   # reseau d'exposition (api accessible)
  backend:    # reseau prive (base de donnees isolee)

volumes:
  postgres-data:
